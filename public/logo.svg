<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Luxury Charcoal/Black -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1E2026" />
      <stop offset="60%" stop-color="#121317" />
      <stop offset="100%" stop-color="#08090A" />
    </radialGradient>
    
    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B38728" />
      <stop offset="25%" stop-color="#FBF5B7" />
      <stop offset="50%" stop-color="#DAA520" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>

    <!-- Metallic Gold Gradient 2 for subtle variations -->
    <linearGradient id="gold-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#F3E7C4" />
      <stop offset="100%" stop-color="#B38728" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50%" cy="50%" r="48" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="1.2" />

  <!-- Thin inner decorative ring -->
  <circle cx="50%" cy="50%" r="43" fill="none" stroke="url(#gold-grad)" stroke-width="0.6" opacity="0.4" />
  
  <!-- Dashed Ring (represents a film reel outline or cinema shutter) -->
  <circle cx="50%" cy="50%" r="40" fill="none" stroke="url(#gold-grad)" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.65" />

  <!-- Center Graphic: Minimalist Geometric Cinema Emblem -->
  <g transform="translate(50, 50)">
    <!-- Elegant stylized star of celebration at the top -->
    <path d="M 0,-24 L 2.5,-17 L 9,-17 L 4,-13 L 6,-6 L 0,-10 L -6,-6 L -4,-13 L -9,-17 L -2.5,-17 Z" fill="url(#gold-grad)" />

    <!-- Sleek, abstract film reel shape (Minimalist and geometric) -->
    <!-- Reel Outer Rim -->
    <circle cx="0" cy="5" r="14" fill="none" stroke="url(#gold-grad)" stroke-width="1.8" />
    
    <!-- Reel Inner Circle -->
    <circle cx="0" cy="5" r="4" fill="url(#gold-grad)" />
    
    <!-- Geometric sprocket holes/cutouts inside the reel -->
    <circle cx="-7" cy="0" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />
    <circle cx="7" cy="0" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />
    <circle cx="-7" cy="10" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />
    <circle cx="7" cy="10" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />
    <circle cx="0" cy="-2" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />
    <circle cx="0" cy="12" r="1.8" fill="#121317" stroke="url(#gold-grad)" stroke-width="0.5" />

    <!-- Sleek, modern crown/screen rays supporting the reel -->
    <path d="M -16,8 L -14,14 L 14,14 L 16,8" fill="none" stroke="url(#gold-grad)" stroke-width="1.2" stroke-linecap="round" />
    
    <!-- Lens projection flare (abstract) -->
    <path d="M -8,14 L -15,22 L 15,22 L 8,14 Z" fill="url(#gold-grad)" opacity="0.15" />
    
    <!-- Small decorative horizontal lines under the projection flare -->
    <line x1="-6" y1="18" x2="6" y2="18" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.8" />
    <line x1="-3" y1="20" x2="3" y2="20" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.8" />
  </g>
</svg>
